<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="diseño.css">
  <title>Mspotify - Aprende escuchando</title>
</head>
<body>

  <!-- Página de bienvenida antes de entrar al juego -->
  <div class="landing">

    <!-- Encabezado: título y logo/imagen del proyecto -->
    <header>
      <h1>Bienvenido a Mspotify</h1>
      <div class="imagen-de-gato">
        <!-- Imagen decorativa del proyecto -->
        <img src="Gato.jpg" class="Gato-img" alt="Mspotify">
      </div>
    </header>

    <!-- Contenido principal: slogan, descripción y botón de acceso al juego -->
    <main>
      <!-- Subtítulo con el nombre de la aplicación -->
      <footer>
        <p>Mspotify Aprende idiomas jugando</p>
      </footer>
      <!-- Descripción breve de la propuesta del proyecto -->
      <p>Aprende escuchando y mejora tu pronunciación</p>
      <!-- Botón que redirige a la página del juego -->
      <a href="proyecto.html" class="Gato-btn btn-comenzar">Comenzar ahora</a>
    </main>

  </div>

  </body>
</html>
